# A generic, single database configuration.

[alembic]
script_location = alembic
prepend_sys_path = .
# BUG FIX: %(DATABASE_URL)s interpolation requires a [vars] or [alembic:env]
# section which is missing — this causes alembic to crash on startup with
# "No config file" or interpolation errors.
# DATABASE_URL is read dynamically in env.py via app.core.config instead.
# Leave sqlalchemy.url commented out and set it in alembic/env.py.
# sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
