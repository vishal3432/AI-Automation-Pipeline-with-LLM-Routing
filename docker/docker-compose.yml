version: "3.9"

services:

  # ─── FastAPI Application ───────────────────────────────────────────────────
  api:
    build:
      context: ..
      # BUG FIX: Dockerfile is in the project root, not in docker/ folder.
      # With context: .. the path is relative to context, so just 'Dockerfile'.
      dockerfile: Dockerfile
    container_name: ai_platform_api
    ports:
      - "8000:8000"
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # BUG FIX: --reload should NOT be used in production — it watches the
    # filesystem and reloads on changes, which is a security/stability risk.
    # Use multiple workers instead for production throughput.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  # ─── Celery Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai_platform_worker
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.workers.celery_app worker
      -Q messages
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=100
    restart: unless-stopped

  # ─── Celery Flower (Monitor) ──────────────────────────────────────────────
  flower:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai_platform_flower
    env_file: ../.env
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app flower --port=5555
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai_platform_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ai_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ai_platform_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Ollama (Local LLM) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ai_platform_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # After first startup, pull a model:
    # docker exec ai_platform_ollama ollama pull mistral

volumes:
  pgdata:
  redisdata:
  ollama_data:
